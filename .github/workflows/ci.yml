name: Django CI/CD Pipeline

on: [push]

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - name: Check out code
              uses: actions/checkout@v3
            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                python-version: '3.10'
            - name: Install dependencies
              run: |
                python -m pip install --upgrade pip
                pip install flake8
            - name: Run Flake8
              run: flake8 .

    test:
        needs: lint
        runs-on: ubuntu-latest
        steps:
            - name: Check out code
              uses: actions/checkout@v3

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                python-version: '3.10'

            - name: Install dependencies
              run: |
                python -m pip install --upgrade pip
                pip install -r requirements.txt

            - name: Run tests
              # Добавляем передачу секретного ключа в окружение
              env:
                SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
                # Если тесты ругнутся на базу, добавьте также:
                # DATABASE_URL: sqlite:///:memory:
              run: python manage.py test

    build:
        needs: test
        runs-on: ubuntu-latest
        steps:
            - name: Check out code
              uses: actions/checkout@v3

            - name: Login in Docker hub
              run: echo ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }} | docker login -u ${{ secrets.DOCKER_HUB_USERNAME }} --password-stdin

            - name: Build Docker image
              run: docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/myapp:${{ github.sha }} .

            - name: Push Docker image in Docker hub
              run: docker push ${{ secrets.DOCKER_HUB_USERNAME }}/myapp:${{ github.sha }}

    deploy:
        needs: build
        runs-on: ubuntu-latest
        steps:
            - name: Set up SSH
              uses: webfactory/ssh-agent@v0.8.0
              with:
                ssh-private-key: ${{ secrets.SSH_KEY }}

            - name: Deploy to Server
              run: |
                ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }} << 'EOF'
                # Заходим в папку проекта
                cd ~/Habit_tracker
                
                # Обновляем код
                git pull origin main
                
                # Перезапускаем контейнеры
                docker compose up -d --build
                
                # Применяем миграции
                docker compose exec -T web python manage.py migrate
                
                # Исправляем права и собираем статику (чтобы админка была со стилями)
                docker compose exec -u root -T web sh -c "mkdir -p /app/staticfiles && chmod -R 777 /app/staticfiles"
                docker compose exec -T web python manage.py collectstatic --noinput
                
                # Очистка неиспользуемых данных
                docker image prune -f
                EOF
